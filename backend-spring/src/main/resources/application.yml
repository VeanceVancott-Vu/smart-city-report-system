spring:
  application:
    name: smart-city-report-backend
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: ${APP_FILE_MAX_UPLOAD_SIZE:5MB}
      max-request-size: ${APP_FILE_MAX_UPLOAD_SIZE:5MB}

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  files:
    upload-dir: ${APP_FILE_UPLOAD_DIR}
    max-upload-size: ${APP_FILE_MAX_UPLOAD_SIZE:5MB}
