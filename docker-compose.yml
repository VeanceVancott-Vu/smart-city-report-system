services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: smart-city-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_city}
      POSTGRES_USER: ${POSTGRES_USER:-smart_city_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_for_local_dev}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
